site_name: Sigmacatch
site_description: Headless tool that captures real Windows events via Winevt API and matches them against SigmaHQ rules
repo_url: https://github.com/frack113/sigmacatch
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - English:
    - Overview: architecture.md
    - Architecture Reference: architecture-reference.md
    - Build: build.md
    - Output Format: output-format.md
    - Regression Data Format: regression-data-format.md

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: fr
          name: Francais
          default: false
          build: true
          nav_translations:
            Accueil: Home
            Overview: Aperçu
            Architecture Reference: Référence Architecture
            Build: Build
            Output Format: Format de Sortie
            Regression Data Format: Format des Données de Régression

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
