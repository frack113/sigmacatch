# git-cliff configuration — adapted from MalwareTracesGenerator

[changelog]
body = """
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.scope | default(value="general") }}: {{ commit.message | upper_first }}\
          {% if commit.breaking %} (⚠️ breaking){% endif %}\
    {% endfor %}
{% endfor %}

{%- if remote.username is defined %}
## Credits
{% for contributor in contributors | filter(attribute="is_first_contribution", value=true) %}
    - {{ contributor.username }} (first contribution)
{% endfor %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = """
---
"""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^feat", group = "✨ Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Docs" },
    { message = "^refactor", group = "♻️ Refactor" },
    { message = "^cleanup", group = "🧹 Cleanup" },
    { message = "^style", group = "💄 Style" },
    { message = "^perf", group = "⚡ Perf" },
    { message = "^test", group = "🧪 Test" },
    { message = "^chore", group = "🔧 Chore" },
    { message = "^revert", group = "⏪ Revert" },
]
sort_commits = "newest"
protect_breaking_commits = true
