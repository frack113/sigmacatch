# Windows logsource routing pipeline.
#
# Maps generic Sigma log source categories to EventID conditions.
# Use this pipeline when evaluating Sigma rules against raw Sysmon JSON
# events that include the EventID field but do not have pre-routed
# logsource metadata.
#
# This pipeline does NOT rename fields — Sigma Windows rules already use
# Sysmon field names (Image, CommandLine, ParentImage, etc.).
# Only adds EventID conditions where the rule specifies a category.
#
# Derived from pySigma-pipeline-sysmon + rsigma-eval sysmon.yml.

name: windows
priority: 5

transformations:
  # EventID 1: process_creation
  - id: win_process_creation
    type: add_condition
    conditions:
      EventID: 1
    rule_conditions:
      - type: logsource
        category: process_creation
        product: windows

  # EventID 2: file_change
